name: Sync Garmin Global to Garmin CN
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

# 强制使用Node.js 24，彻底消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 升级到v5，原生支持Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v6  # 升级到v6，原生支持Node.js 24
        with:
          python-version: '3.12'  # 最新稳定版Python，兼容性更好
          cache: 'pip'  # 缓存依赖，加速运行
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garth python-dotenv  # 修复依赖：使用原项目的garth库
      - name: Run sync Global to CN
        run: python sync_global_to_cn.py
        env:
          GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
          GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
